<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="阿尔戈斯计划 Project Argus Logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241a0c"/><stop offset="1" stop-color="#0b0805"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6d488"/><stop offset="0.55" stop-color="#e7b35c"/><stop offset="1" stop-color="#b9832e"/>
    </linearGradient>
  </defs>

  <rect width="240" height="240" rx="52" fill="url(#bg)"/>
  <rect x="6" y="6" width="228" height="228" rx="46" fill="none" stroke="#3a2c12" stroke-width="2"/>

  <!-- 全视之眼:外轮廓(阿尔戈斯百眼的守望) -->
  <path d="M24 120 C72 64,168 64,216 120 C168 176,72 176,24 120 Z"
        fill="none" stroke="url(#gold)" stroke-width="5" stroke-linejoin="round"/>

  <!-- 虹膜 = 金色圆盘 -->
  <circle cx="120" cy="120" r="54" fill="url(#gold)"/>

  <!-- 光圈叶片(摄影机镜头):暗色螺旋叶片 -->
  <g stroke="#1a1206" stroke-width="6" stroke-linecap="round" fill="none">
    <line x1="120" y1="96"   x2="147" y2="73"/>
    <line x1="140.8" y1="108" x2="174" y2="120"/>
    <line x1="140.8" y1="132" x2="147" y2="167"/>
    <line x1="120" y1="144"  x2="93"  y2="167"/>
    <line x1="99.2" y1="132" x2="66"  y2="120"/>
    <line x1="99.2" y1="108" x2="93"  y2="73"/>
  </g>

  <!-- 光圈开口 = 六边形瞳孔 -->
  <polygon points="120,96 140.8,108 140.8,132 120,144 99.2,132 99.2,108" fill="#120c04"/>
  <polygon points="120,96 140.8,108 140.8,132 120,144 99.2,132 99.2,108"
           fill="none" stroke="#7a5a1e" stroke-width="1.5"/>

  <!-- 高光 -->
  <circle cx="104" cy="104" r="5" fill="#fff3da"/>
</svg>
