<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>阿尔戈斯 · 全球电影情报站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-row">
      <div class="brand">
        <div class="logo" role="img" aria-label="阿尔戈斯计划 Logo">
          <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="argBg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#241a0c"/><stop offset="1" stop-color="#0c0a05"/>
              </linearGradient>
              <linearGradient id="argGold" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#f4cd7a"/><stop offset="1" stop-color="#c8952f"/>
              </linearGradient>
            </defs>
            <rect width="40" height="40" rx="10" fill="url(#argBg)"/>
            <path d="M5.5 20 C13 11.5,27 11.5,34.5 20 C27 28.5,13 28.5,5.5 20 Z" fill="none" stroke="url(#argGold)" stroke-width="1.7"/>
            <circle cx="20" cy="20" r="6.7" fill="url(#argGold)"/>
            <polygon points="20,14.6 24.6,17.3 24.6,22.7 20,25.4 15.4,22.7 15.4,17.3" fill="#1a1206"/>
            <g stroke="#7a5a1e" stroke-width="0.8" stroke-linecap="round">
              <line x1="20" y1="14.6" x2="15.4" y2="17.3"/>
              <line x1="24.6" y1="17.3" x2="20" y2="14.6"/>
              <line x1="24.6" y1="22.7" x2="24.6" y2="17.3"/>
            </g>
            <circle cx="17.6" cy="17.6" r="1.1" fill="#fff3da"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>阿尔戈斯计划</h1>
          <div class="brand-sub">PROJECT ARGUS</div>
        </div>
      </div>
      <span id="updatedAt" class="updated">加载中…</span>
    </div>

    <!-- 四大板块导航 -->
    <div class="seg seg-main" id="sectionSeg">
      <button data-section="douban" class="active">🎬 豆瓣情报</button>
      <button data-section="boxoffice">💰 全球票房</button>
      <button data-section="news">📰 媒体资讯</button>
      <button data-section="festivals">🏆 电影节</button>
    </div>
  </header>

  <!-- ============ 板块1:豆瓣情报 ============ -->
  <section id="sec-douban" class="section">
    <div class="subbar">
      <div class="seg" id="yearSeg">
        <button data-year="2026" class="active">2026</button>
        <button data-year="2027">2027</button>
        <button data-year="all">全部</button>
      </div>
      <div class="seg seg-wrap" id="statusSeg">
        <button data-status="待筛" class="active">待筛 <em id="c-待筛">0</em></button>
        <button data-status="重点关注">⭐重点关注 <em id="c-重点关注">0</em></button>
        <button data-status="保留">保留 <em id="c-保留">0</em></button>
        <button data-status="淘汰">🗑淘汰 <em id="c-淘汰">0</em></button>
        <button data-status="all">全部 <em id="c-all">0</em></button>
      </div>
      <div class="filters">
        <select id="countrySel"><option value="">全部国家</option></select>
        <select id="sortSel">
          <option value="default">默认排序</option>
          <option value="score_desc">豆瓣分高→低</option>
          <option value="imdb_desc">IMDb分高→低</option>
          <option value="has_score">有分优先</option>
          <option value="d_star5_desc">今日新增5星</option>
          <option value="d_comments_desc">今日新增短评</option>
        </select>
        <input id="searchBox" type="search" placeholder="搜索片名/原名/导演…" />
      </div>
      <div class="count-row">
        <span id="resultCount">0 部</span>
        <button id="addWatchBtn" class="addwatch-toggle" type="button">＋ 添加监测</button>
      </div>
      <div id="addWatchForm" class="addwatch-form" hidden>
        <input id="addWatchUrl" type="text" placeholder="粘贴豆瓣链接,如 https://movie.douban.com/subject/1234567/" />
        <select id="addWatchStatus">
          <option value="重点关注">⭐重点关注</option>
          <option value="保留">保留</option>
        </select>
        <button id="addWatchSubmit" type="button">加入监测</button>
      </div>
    </div>
    <main id="list" class="list"></main>
  </section>

  <!-- ============ 板块2:全球票房 ============ -->
  <section id="sec-boxoffice" class="section" hidden>
    <div class="subbar">
      <div class="filters">
        <select id="boMarketSel"><option value="">全部市场</option></select>
        <input id="boSearchBox" type="search" placeholder="搜索片名/市场…" />
      </div>
      <div class="count-row"><span id="boCount"></span></div>
    </div>
    <main id="boList" class="list"></main>
  </section>

  <!-- ============ 板块3:媒体资讯 ============ -->
  <section id="sec-news" class="section" hidden>
    <div class="subbar">
      <div class="seg seg-wrap" id="newsSourceSeg"></div>
      <div class="filters">
        <input id="newsSearchBox" type="search" placeholder="搜索资讯标题…" />
      </div>
      <div class="count-row"><span id="newsCount"></span></div>
    </div>
    <main id="newsList" class="newslist"></main>
  </section>

  <!-- ============ 板块4:电影节 ============ -->
  <section id="sec-festivals" class="section" hidden>
    <div class="subbar">
      <div class="seg seg-wrap" id="festTierSeg">
        <button data-tier="all" class="active">全部</button>
        <button data-tier="国际A类">国际A类</button>
        <button data-tier="专门竞赛">专门竞赛</button>
        <button data-tier="重要展映">重要展映</button>
        <button data-tier="电影奖项">电影奖项</button>
        <button data-tier="交易市场">交易市场</button>
      </div>
    </div>
    <main id="festList" class="festlist"></main>
  </section>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
